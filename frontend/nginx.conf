# nginx config for the frontend container.
# Included from /etc/nginx/nginx.conf inside the http{} block, so http-level
# directives like `map` are valid here.
#
# The three proxied prefixes below MUST mirror the Vite dev proxy
# (frontend/vite.config.ts): /api, /uploads, /socket.io. Same-origin serving
# is what makes the SameSite=Lax session cookie and the double-submit CSRF
# cookie work without any cross-site configuration.

# Only send "Connection: upgrade" when the client actually requests a
# WebSocket upgrade (Socket.IO handshake); engine.io long-polling requests
# keep normal keep-alive semantics.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Product image uploads are capped at 5MB by multer (backend); allow
    # headroom for the multipart envelope.
    client_max_body_size 10m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ---- backend proxies ----------------------------------------------------
    # X-Forwarded-For is required: the backend sets `trust proxy: 1` and its
    # rate limiters key on req.ip — without this header every client would
    # share one bucket. X-Forwarded-Proto tells express-session/csrf whether
    # the original request was HTTPS (relevant when COOKIE_SECURE=true behind
    # a TLS terminator in front of this container).

    location /api {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        # WebSocket upgrade — without these two headers Socket.IO silently
        # degrades to long-polling (or fails outright on strict setups).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        # Long-lived chat connections — don't let idle sockets be reaped by
        # the default 60s proxy timeouts.
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # ---- static assets --------------------------------------------------------
    # Vite emits content-hashed filenames under /assets — cache forever.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        # add_header does not inherit across levels once set in a location,
        # and the security headers below live in `location /` — repeat the
        # one that matters for static assets here.
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SPA fallback: any non-file route (e.g. /products/uuid) serves index.html
    # and lets react-router resolve it client-side.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        # Security headers for statically served documents. API/uploads
        # responses already get these from helmet (backend/src/app.ts), so
        # they are deliberately NOT set at server level — that would
        # duplicate headers on proxied responses.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Mirrors helmet's CSP. ws:/wss: kept explicit for browsers that do
        # not treat 'self' as matching WebSocket upgrades.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:; object-src 'none'; base-uri 'none'; frame-ancestors 'none'" always;
    }
}
